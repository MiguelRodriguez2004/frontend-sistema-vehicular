server {
    listen 80;
    server_name localhost;

    # Directorio raíz donde están los archivos compilados por Vite
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # SOPORTE PARA REACT ROUTER (Single Page Application)
    # -------------------------------------------------------
    # Esto es CRÍTICO para aplicaciones de una sola página (SPA).
    # Sin esto, si el usuario navega directamente a una ruta como
    # /clientes o /ordenes o si hace F5 en cualquier sub-ruta,
    # Nginx devolvería un 404 porque ese archivo físico no existe.
    #
    # La directiva "try_files" le indica a Nginx:
    # 1. Primero intenta servir el archivo exacto ($uri)
    # 2. Si no existe, intenta servir como directorio ($uri/)
    # 3. Si tampoco existe, sirve index.html y deja que React Router
    #    maneje la navegación desde el lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------
    # CACHÉ OPTIMIZADO PARA ASSETS ESTÁTICOS
    # -------------------------------------------------------
    # Vite genera nombres de archivo con hashes únicos (content hashing)
    # ej: main-Abc123.js. Podemos cachearlos agresivamente (1 año)
    # porque si el contenido cambia, el hash cambiará automáticamente.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------
    # CABECERAS DE SEGURIDAD
    # -------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Manejo de errores: redirige cualquier error a index.html
    error_page 404 /index.html;
}
